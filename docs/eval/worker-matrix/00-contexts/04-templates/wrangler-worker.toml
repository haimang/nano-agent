# Historical starter template for worker-matrix r2.
#
# Current primary shell baseline now lives in:
# - workers/agent-core/wrangler.jsonc
# - workers/bash-core/wrangler.jsonc
# - workers/context-core/wrangler.jsonc
# - workers/filesystem-core/wrangler.jsonc
#
# Keep this file as an ancestry-backed checklist of platform law:
# - treat `x-nacp-*` headers as lowercase on service-binding seams
# - keep DO size policy explicit (`2_097_152` is a planning cap, not a silent default)
# - keep R2 parallel write default conservative (`50`)
# - keep `agent.core` as the host worker, not a binding slot

name = "nano-agent-worker-template"
main = "dist/worker.js"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
OWNER_TAG = "nano-agent"

# Host workers (for example `agent.core`) keep a session DO binding.
# Remote workers may delete this block entirely.
[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "NanoSessionDO"

# Host workers usually keep warm config in KV.
# Remote workers can remove this when they are fully stateless.
[[kv_namespaces]]
binding = "KV_CONFIG"
id = "replace-with-kv-id"

# Artifact / cold storage binding. Keep it where large outputs or summaries
# may spill to R2 instead of DO storage.
[[r2_buckets]]
binding = "R2_ARTIFACTS"
bucket_name = "replace-with-r2-bucket"

# Only add D1 when the worker really needs query/batch semantics.
# Do not invent `BEGIN/COMMIT`; B2/B7 kept D1 intentionally narrow.
[[d1_databases]]
binding = "D1_PRIMARY"
database_name = "replace-with-d1-name"
database_id = "replace-with-d1-id"

# First-wave service-name family already materialized by W4 shells.
[[services]]
binding = "BASH_CORE"
service = "nano-agent-bash-core"

[[services]]
binding = "FILESYSTEM_CORE"
service = "nano-agent-filesystem-core"

[[services]]
binding = "CONTEXT_CORE"
service = "nano-agent-context-core"

# Reserved only. Do not instantiate unless worker-matrix r2 explicitly
# widens first-wave scope.
# [[services]]
# binding = "SKILL_CORE"
# service = "nano-agent-skill-core"

[observability]
enabled = true
